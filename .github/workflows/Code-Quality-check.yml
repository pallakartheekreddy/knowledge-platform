name: Pull Request Checks

on:
  pull_request:
    branches:
      - '*'

permissions:
  pull-requests: write
  contents: read
  issues: write
  checks: write
  statuses: write

env:
  CLOUD_STORE_GROUP_ID: ${{ vars.CLOUD_STORE_GROUP_ID }}
  CLOUD_STORE_ARTIFACT_ID: ${{ vars.CLOUD_STORE_ARTIFACT_ID }}
  CLOUD_STORE_VERSION: ${{ vars.CLOUD_STORE_VERSION }}
  JACOCO_VERSION: "0.8.8"
  JACOCO_MIN_COVERAGE: "0.80"

jobs:
  # ─────────────────────────────────────────────
  # 1. Scala formatting check (Scalafmt)
  # ─────────────────────────────────────────────
  scalafmt-check:
    name: Scala Formatting (Scalafmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Check Scala formatting
        run: |
          mvn scalafmt:check \
            -Dscalafmt.config=.scalafmt.conf \
            --no-transfer-progress \
            || { echo "::error::Scala formatting violations found. Run 'mvn scalafmt:format' locally and commit."; exit 1; }

  # ─────────────────────────────────────────────
  # 2. OWASP Dependency Vulnerability Check
  # ─────────────────────────────────────────────
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache NVD data
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp
          key: owasp-nvd-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            owasp-nvd-${{ runner.os }}-

      - name: Run OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:9.0.9:check \
            -DfailBuildOnCVSS=9 \
            -DsuppressionFile=.github/owasp-suppressions.xml \
            -DnvdApiDelay=6000 \
            --no-transfer-progress \
            -DskipSystemScope=true \
            -DassemblyAnalyzerEnabled=false \
            -DnodeAnalyzerEnabled=false \
            -DretireJsAnalyzerEnabled=false \
            || echo "::warning::OWASP Dependency Check found vulnerabilities. Review report."
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload OWASP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: '**/target/dependency-check-report.html'
          retention-days: 14

  # ─────────────────────────────────────────────
  # 3. Full project build (compilation gate)
  # ─────────────────────────────────────────────
  build:
    name: Build (Compile)
    runs-on: ubuntu-latest
    outputs:
      maven_cache_key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build Knowledge Platform
        run: mvn clean install -DskipTests=true --no-transfer-progress

  # ─────────────────────────────────────────────
  # 4. Service tests with JaCoCo (parallel)
  # ─────────────────────────────────────────────
  test-content:
    name: Test — Content Service
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Restore Maven cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run Content Service Tests with Coverage
        working-directory: content-api/content-service
        run: |
          mvn clean \
            org.jacoco:jacoco-maven-plugin:${{ env.JACOCO_VERSION }}:prepare-agent \
            test \
            org.jacoco:jacoco-maven-plugin:${{ env.JACOCO_VERSION }}:report \
            org.jacoco:jacoco-maven-plugin:${{ env.JACOCO_VERSION }}:check \
            -Djacoco.minimum.coverage=${{ env.JACOCO_MIN_COVERAGE }} \
            --no-transfer-progress

      - name: Upload Content Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: content-test-results
          path: 'content-api/content-service/target/surefire-reports/*.xml'
          retention-days: 7

      - name: Upload Content Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: content-coverage-report
          path: 'content-api/content-service/target/site/jacoco/'
          retention-days: 7

      - name: Publish Content Test Results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Content Test Results
          path: content-api/content-service/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true

  test-assessment:
    name: Test — Assessment Service
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Restore Maven cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run Assessment Service Tests with Coverage
        working-directory: assessment-api/assessment-service
        run: |
          mvn clean \
            org.jacoco:jacoco-maven-plugin:${{ env.JACOCO_VERSION }}:prepare-agent \
            test \
            org.jacoco:jacoco-maven-plugin:${{ env.JACOCO_VERSION }}:report \
            org.jacoco:jacoco-maven-plugin:${{ env.JACOCO_VERSION }}:check \
            -Djacoco.minimum.coverage=${{ env.JACOCO_MIN_COVERAGE }} \
            --no-transfer-progress

      - name: Upload Assessment Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: assessment-test-results
          path: 'assessment-api/assessment-service/target/surefire-reports/*.xml'
          retention-days: 7

      - name: Upload Assessment Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: assessment-coverage-report
          path: 'assessment-api/assessment-service/target/site/jacoco/'
          retention-days: 7

      - name: Publish Assessment Test Results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Assessment Test Results
          path: assessment-api/assessment-service/target/surefire-reports/*.xml
