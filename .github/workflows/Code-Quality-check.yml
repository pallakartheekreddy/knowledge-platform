          fail-on-error: true

  test-taxonomy:
    name: Test — Taxonomy Service
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Restore Maven cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run Taxonomy Service Tests with Coverage
        working-directory: taxonomy-api/taxonomy-service
        run: |
          mvn clean \
            org.jacoco:jacoco-maven-plugin:${{ env.JACOCO_VERSION }}:prepare-agent \
            test \
            org.jacoco:jacoco-maven-plugin:${{ env.JACOCO_VERSION }}:report \
            org.jacoco:jacoco-maven-plugin:${{ env.JACOCO_VERSION }}:check \
            -Djacoco.minimum.coverage=${{ env.JACOCO_MIN_COVERAGE }} \
            --no-transfer-progress

      - name: Upload Taxonomy Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: taxonomy-test-results
          path: 'taxonomy-api/taxonomy-service/target/surefire-reports/*.xml'
          retention-days: 7

      - name: Upload Taxonomy Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: taxonomy-coverage-report
          path: 'taxonomy-api/taxonomy-service/target/site/jacoco/'
          retention-days: 7

      - name: Publish Taxonomy Test Results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Taxonomy Test Results
          path: taxonomy-api/taxonomy-service/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true

  test-search:
    name: Test — Search Service
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Restore Maven cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run Search Service Tests with Coverage
        working-directory: search-api/search-service
        run: |
          mvn clean \
            org.jacoco:jacoco-maven-plugin:${{ env.JACOCO_VERSION }}:prepare-agent \
            test \
            org.jacoco:jacoco-maven-plugin:${{ env.JACOCO_VERSION }}:report \
            org.jacoco:jacoco-maven-plugin:${{ env.JACOCO_VERSION }}:check \
