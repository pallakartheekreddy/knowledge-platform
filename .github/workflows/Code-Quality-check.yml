          path: knowlg-service/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true

  # ─────────────────────────────────────────────
  # 5. SonarCloud analysis (per service, in parallel)
  # ─────────────────────────────────────────────
  sonar-analysis-content:
    name: SonarCloud — Content Service
    needs: test-content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Download Content Coverage Report
        uses: actions/download-artifact@v4
        with:
          name: content-coverage-report
          path: content-api/content-service/target/site/jacoco/

      - name: Run SonarCloud Analysis for Content
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        working-directory: content-api/content-service
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=Sunbird-Knowlg_knowledge-platform \
            -Dsonar.organization=sunbird-knowlg-1 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            --no-transfer-progress

  sonar-analysis-assessment:
    name: SonarCloud — Assessment Service
    needs: test-assessment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Download Assessment Coverage Report
        uses: actions/download-artifact@v4
        with:
          name: assessment-coverage-report
          path: assessment-api/assessment-service/target/site/jacoco/

      - name: Run SonarCloud Analysis for Assessment
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        working-directory: assessment-api/assessment-service
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=Sunbird-Knowlg_knowledge-platform \
            -Dsonar.organization=sunbird-knowlg-1 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            --no-transfer-progress

  sonar-analysis-taxonomy:
    name: SonarCloud — Taxonomy Service
    needs: test-taxonomy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Download Taxonomy Coverage Report
        uses: actions/download-artifact@v4
        with:
          name: taxonomy-coverage-report
          path: taxonomy-api/taxonomy-service/target/site/jacoco/

      - name: Run SonarCloud Analysis for Taxonomy
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        working-directory: taxonomy-api/taxonomy-service
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=Sunbird-Knowlg_knowledge-platform \
            -Dsonar.organization=sunbird-knowlg-1 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            --no-transfer-progress

  sonar-analysis-search:
    name: SonarCloud — Search Service
    needs: test-search
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Download Search Coverage Report
        uses: actions/download-artifact@v4
        with:
          name: search-coverage-report
          path: search-api/search-service/target/site/jacoco/

      - name: Run SonarCloud Analysis for Search
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        working-directory: search-api/search-service
        run: |
          mvn clean compile --no-transfer-progress
          mvn sonar:sonar \
            -Dsonar.projectKey=Sunbird-Knowlg_knowledge-platform \
            -Dsonar.organization=sunbird-knowlg-1 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.java.binaries=target/classes \
            -Dsonar.java.test.binaries=target/test-classes \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            --no-transfer-progress

  # ─────────────────────────────────────────────
  # 6. PR summary comment
  # ─────────────────────────────────────────────
  comment-pr:
    name: PR Summary Comment
    needs:
      - scalafmt-check
      - sonar-analysis-content
      - sonar-analysis-assessment
      - sonar-analysis-taxonomy
      - sonar-analysis-search
    if: github.event_name == 'pull_request' && always()
    runs-on: ubuntu-latest
    steps:
      - name: Comment PR with Quality Results
        uses: actions/github-script@v7
        with:
          script: |
            const formatStatus = (needs, job) => {
              const result = needs[job]?.result;
              if (result === 'success') return '✅ Passed';
              if (result === 'failure') return '❌ Failed';
              if (result === 'skipped') return '⏭️ Skipped';
              return '⚠️ Unknown';
            };

            const message = `### PR Quality Gate Summary

            | Check | Status |
            |-------|--------|
            | Scala Formatting (Scalafmt) | ${formatStatus(context.payload.workflow_run ?? {}, 'scalafmt-check')} |
            | SonarCloud — Content | ${formatStatus(context.payload.workflow_run ?? {}, 'sonar-analysis-content')} |
            | SonarCloud — Assessment | ${formatStatus(context.payload.workflow_run ?? {}, 'sonar-analysis-assessment')} |
            | SonarCloud — Taxonomy | ${formatStatus(context.payload.workflow_run ?? {}, 'sonar-analysis-taxonomy')} |
            | SonarCloud — Search | ${formatStatus(context.payload.workflow_run ?? {}, 'sonar-analysis-search')} |

            #### SonarCloud Dashboards
            - [Content Service](https://sonarcloud.io/dashboard?id=Sunbird-Knowlg_knowledge-platform)
            - [Assessment Service](https://sonarcloud.io/dashboard?id=Sunbird-Knowlg_knowledge-platform)
            - [Taxonomy Service](https://sonarcloud.io/dashboard?id=Sunbird-Knowlg_knowledge-platform)
            - [Search Service](https://sonarcloud.io/dashboard?id=Sunbird-Knowlg_knowledge-platform)

            > Coverage threshold: **80%** — PRs below this threshold will fail.
            > Scalafmt: run \`mvn scalafmt:format\` locally if formatting check fails.`;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            });
