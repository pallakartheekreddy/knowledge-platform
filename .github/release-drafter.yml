name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

# Semantic versioning: commits with breaking changes → major,
# feat commits → minor, everything else → patch
version-resolver:
  major:
    labels:
      - 'breaking-change'
      - 'major'
  minor:
    labels:
      - 'feature'
      - 'enhancement'
  patch:
    labels:
      - 'bug'
      - 'bugfix'
      - 'fix'
      - 'patch'
      - 'dependencies'
      - 'chore'
  default: patch

categories:
  - title: 'Breaking Changes'
    labels:
      - 'breaking-change'
      - 'major'
  - title: 'New Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: 'Bug Fixes'
    labels:
      - 'bug'
      - 'bugfix'
      - 'fix'
  - title: 'Security'
    labels:
      - 'security'
  - title: 'Dependencies'
    labels:
      - 'dependencies'
      - 'maven'
      - 'github-actions'
  - title: 'Maintenance'
    labels:
      - 'chore'
      - 'refactoring'
      - 'documentation'

# Exclude PRs from bots
exclude-labels:
  - 'skip-changelog'

# Template for the release body
template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: $PREVIOUS_TAG...v$RESOLVED_VERSION

autolabeler:
  - label: 'feature'
    title:
      - '/^feat(\(.+\))?:/i'
      - '/^feature:/i'
  - label: 'bug'
    title:
      - '/^fix(\(.+\))?:/i'
      - '/^bugfix:/i'
  - label: 'breaking-change'
    title:
      - '/^.+!:/i'
    body:
      - '/BREAKING CHANGE/i'
  - label: 'chore'
    title:
      - '/^chore(\(.+\))?:/i'
      - '/^refactor(\(.+\))?:/i'
  - label: 'documentation'
    title:
      - '/^docs(\(.+\))?:/i'
  - label: 'dependencies'
    title:
      - '/^(chore\(deps\)|build\(deps\)):/i'
    branch:
      - '/^dependabot\//i'
  - label: 'security'
    title:
      - '/^security:/i'
    body:
      - '/CVE-\d{4}-\d+/i'
